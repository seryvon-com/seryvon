# Configuration Alembic pour Seryvon.
# L'URL de base est injectée à l'exécution depuis SERYVON_DATABASE_URL (voir env.py),
# donc sqlalchemy.url reste volontairement vide ici.
[alembic]
script_location = alembic
prepend_sys_path = src
path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

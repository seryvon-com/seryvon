name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Types · Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: seryvon
          POSTGRES_PASSWORD: seryvon
          POSTGRES_DB: seryvon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seryvon"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      SERYVON_DATABASE_URL: postgresql+psycopg://seryvon:seryvon@localhost:5432/seryvon
      SERYVON_REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src

      - name: Migrations apply cleanly
        run: alembic upgrade head

      - name: Tests + coverage
        run: pytest --junitxml=.tmp-pytest.xml --cov-report=json:.tmp-coverage.json

      - name: Refresh landing metrics feed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          LANDING_CURRENT_RELEASE: v1.0-rc
        run: python scripts/generate_landing_metrics.py

      - name: Commit landing metrics feed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/landing-metrics.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh landing metrics feed"
          git push

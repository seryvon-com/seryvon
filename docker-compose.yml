# Seryvon — orchestration complète (Phase 6) : postgres, redis, migrate (one-shot),
# api, workers CPU/IO, frontend React (nginx).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: seryvon
      POSTGRES_PASSWORD: seryvon
      POSTGRES_DB: seryvon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seryvon"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      SERYVON_DATABASE_URL: postgresql+psycopg://seryvon:seryvon@postgres:5432/seryvon
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: .env
    environment:
      SERYVON_DATABASE_URL: postgresql+psycopg://seryvon:seryvon@postgres:5432/seryvon
      SERYVON_REDIS_URL: redis://redis:6379/0
      SERYVON_CELERY_BROKER_URL: redis://redis:6379/1
      SERYVON_CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

  # File CPU-bound : crawl, rendu, scoring, ASO statique.
  worker-cpu:
    build: .
    command: celery -A seryvon.tasks.app:celery_app worker -Q cpu -c 2 -l info
    env_file: .env
    environment:
      SERYVON_DATABASE_URL: postgresql+psycopg://seryvon:seryvon@postgres:5432/seryvon
      SERYVON_CELERY_BROKER_URL: redis://redis:6379/1
      SERYVON_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # File IO-bound : appels LLM/SERP. Concurrence plus élevée (attente réseau).
  worker-io:
    build: .
    command: celery -A seryvon.tasks.app:celery_app worker -Q io -c 8 -l info
    env_file: .env
    environment:
      SERYVON_DATABASE_URL: postgresql+psycopg://seryvon:seryvon@postgres:5432/seryvon
      SERYVON_CELERY_BROKER_URL: redis://redis:6379/1
      SERYVON_CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
